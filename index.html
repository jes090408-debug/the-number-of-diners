<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>석식 확인 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f4f7f6; overflow-x: hidden; touch-action: manipulation; }
        
        /* 1. 컨테이너 너비 제한을 풀고 화면의 95%를 사용하게 설정 */
        .container { 
            text-align: center; 
            background: white; 
            padding: 60px 20px; 
            border-radius: 50px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.15); 
            width: 95%; 
            max-width: 1000px; /* 기존 450px -> 1000px로 대폭 확장 */
            position: relative; 
            margin: 20px;
        }
        
        /* 2. 상단 설정 버튼 및 인원 정보 크기 확대 */
        .settings-btn { position: absolute; top: 30px; right: 30px; font-size: 50px; cursor: pointer; background: #f0f0f0; border: 1px solid #ddd; border-radius: 20px; padding: 15px; z-index: 999; }
        .count-info { font-size: 2.5rem; color: #555; margin-bottom: 30px; font-weight: bold; }
        #remainingCount { font-size: 3.5rem; }

        /* 3. 제목 및 입력창 거대화 */
        h1 { margin-bottom: 50px; color: #2c3e50; font-size: 3.5rem; }
        
        #studentId { 
            width: 90%; 
            padding: 40px; 
            font-size: 4rem; /* 입력 글자 거대화 */
            border: 8px solid #ebebeb; 
            border-radius: 30px; 
            text-align: center; 
            box-sizing: border-box; 
            outline: none; 
            margin-bottom: 40px;
            background-color: #fafafa;
        }
        #studentId:focus { border-color: #3498db; background-color: #fff; }
        
        /* 4. 결과 메시지 영역 (화면의 핵심) */
        #result { 
            margin-top: 20px; 
            font-size: 5rem; /* 결과 글자를 거의 제목만큼 키움 */
            font-weight: 900; 
            min-height: 2em;
            line-height: 1.4;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .pop-effect { transform: scale(1.1); }
        .sub-text { font-size: 2rem; color: #888; display: block; margin-bottom: 15px; }

        /* 관리자 모달 */
        #adminModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 10000; }
        .modal-content { background: white; padding: 50px; border-radius: 40px; width: 90%; max-width: 600px; text-align: center; }
        .admin-btn { width: 100%; padding: 25px; margin-top: 20px; border-radius: 20px; border: none; background: #2c3e50; color: white; font-size: 2rem; cursor: pointer; }
        #adminPw { width: 100%; padding: 25px; font-size: 2rem; border-radius: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body onclick="initAudio()">

    <div class="container">
        <button type="button" class="settings-btn" onclick="openAdmin(event)">⚙️</button>
        <div class="count-info">남은 인원 : <span id="remainingCount" style="color:#007bff;">0</span>명</div>
        <h1>석식 확인 시스템</h1>
        <input type="text" id="studentId" placeholder="학번 입력" inputmode="numeric" autofocus>
        <div id="result"><span style="font-size:2rem; color:#aaa;">대기 중...</span></div>
    </div>

    <div id="adminModal">
        <div class="modal-content">
            <div id="loginSection">
                <h2>관리자 인증</h2>
                <input type="password" id="adminPw" placeholder="비밀번호">
                <button class="admin-btn" onclick="checkPw()">확인</button>
                <button class="admin-btn" style="background:#95a5a6" onclick="closeAdmin()">취소</button>
            </div>
            <div id="uploadSection" style="display:none;">
                <h2>명단 업로드</h2>
                <input type="file" id="excelFile" accept=".xlsx, .xls" style="font-size:1.5rem; margin: 30px 0;">
                <button class="admin-btn" style="background:#95a5a6" onclick="closeAdmin()">닫기</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC1eVAqF527F46V8EgB4lwzzprGyiwqpiU",
            authDomain: "dinner2-1bc7e.firebaseapp.com",
            databaseURL: "https://dinner2-1bc7e-default-rtdb.firebaseio.com",
            projectId: "dinner2-1bc7e",
            storageBucket: "dinner2-1bc7e.firebasestorage.app",
            messagingSenderId: "1097131635899",
            appId: "1:1097131635899:web:7c4d7c84e0db18690ee59e",
            measurementId: "G-NGWKJSG6RH"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'success') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15); 
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            }
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        db.ref('students').on('value', (snapshot) => {
            const data = snapshot.val();
            document.getElementById('remainingCount').innerText = data ? Object.keys(data).length : 0;
        });

        document.getElementById('studentId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const id = this.value.trim();
                const resultDiv = document.getElementById('result');
                if(!id) return;
                
                resultDiv.classList.remove('pop-effect');
                
                db.ref('students/' + id).once('value', (snap) => {
                    void resultDiv.offsetWidth; 

                    if(snap.exists()) {
                        resultDiv.innerHTML = `<span class="sub-text">확인 완료</span><span style="color:#2ecc71;">✅ ${id}</span>`;
                        playSound('success'); 
                        db.ref('students/' + id).remove();
                    } else {
                        resultDiv.innerHTML = `<span class="sub-text" style="color:#e74c3c;">명단 없음</span><span style="color:#e74c3c;">❌ ${id}</span>`;
                        playSound('error'); 
                    }
                    
                    resultDiv.classList.add('pop-effect');
                    this.value = '';
                    this.focus();
                });
            }
        });

        function openAdmin(e) { e.preventDefault(); document.getElementById('adminModal').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }
        function checkPw() {
            if (document.getElementById('adminPw').value === "1234!") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('uploadSection').style.display = 'block';
            } else { alert("비밀번호 오류"); }
        }

        document.getElementById('excelFile').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                let uploadData = {};
                rows.forEach(row => { if(row[0]) uploadData[row[0].toString().trim()] = true; });
                db.ref('students').set(uploadData).then(() => {
                    alert("업로드 완료!");
                    closeAdmin();
                });
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
