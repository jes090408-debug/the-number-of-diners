<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>석식 확인 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f4f7f6; overflow-x: hidden; touch-action: manipulation; }
        
        .container { text-align: center; background: white; padding: 60px 20px; border-radius: 50px; box-shadow: 0 25px 60px rgba(0,0,0,0.15); width: 95%; max-width: 1000px; position: relative; margin: 20px; }
        
        /* 버튼 그룹 */
        .btn-group { position: absolute; top: 30px; right: 30px; display: flex; gap: 15px; }
        .icon-btn { font-size: 40px; cursor: pointer; background: #f0f0f0; border: 1px solid #ddd; border-radius: 20px; padding: 15px; line-height: 1; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.9); }
        
        .count-info { font-size: 2.5rem; color: #555; margin-bottom: 30px; font-weight: bold; }
        #remainingCount { font-size: 3.5rem; }

        h1 { margin-bottom: 50px; color: #2c3e50; font-size: 3.5rem; }
        
        #studentId { width: 90%; padding: 40px; font-size: 4rem; border: 8px solid #ebebeb; border-radius: 30px; text-align: center; box-sizing: border-box; outline: none; margin-bottom: 40px; background-color: #fafafa; }
        #studentId:focus { border-color: #3498db; background-color: #fff; }
        
        #result { margin-top: 20px; font-size: 5rem; font-weight: 900; min-height: 2em; line-height: 1.4; transition: transform 0.2s; }
        .pop-effect { transform: scale(1.1); }
        .sub-text { font-size: 2rem; color: #888; display: block; margin-bottom: 15px; }

        /* 공통 모달 스타일 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 10000; }
        .modal-content { background: white; padding: 40px; border-radius: 40px; width: 90%; max-width: 600px; text-align: center; }
        
        /* 통계 테이블 스타일 */
        .stat-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 1.5rem; }
        .stat-table th, .stat-table td { border-bottom: 1px solid #eee; padding: 20px 10px; }
        .stat-table th { background: #f8f9fa; color: #666; font-size: 1.2rem; }
        .completed { color: #2ecc71; font-weight: bold; }
        .pending { color: #e74c3c; font-weight: bold; }

        .admin-btn { width: 100%; padding: 25px; margin-top: 20px; border-radius: 20px; border: none; background: #2c3e50; color: white; font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body onclick="initAudio()">

    <div class="container">
        <div class="btn-group">
            <button type="button" class="icon-btn" onclick="showStats()" title="통계 보기">⭐</button>
            <button type="button" class="icon-btn" onclick="openAdmin()" title="설정">⚙️</button>
        </div>
        
        <div class="count-info">전체 남은 인원 : <span id="remainingCount" style="color:#007bff;">0</span>명</div>
        <h1>석식 확인 시스템</h1>
        <input type="text" id="studentId" placeholder="학번 입력" inputmode="numeric" autofocus>
        <div id="result"><span style="font-size:2rem; color:#aaa;">대기 중...</span></div>
    </div>

    <div id="statsModal" class="modal">
        <div class="modal-content">
            <h2 style="font-size: 2.5rem; margin-bottom: 20px;">학년별 배식 현황</h2>
            <table class="stat-table">
                <thead>
                    <tr>
                        <th>학년</th>
                        <th>배식 완료</th>
                        <th>미배식(남음)</th>
                        <th>전체</th>
                    </tr>
                </thead>
                <tbody id="statBody">
                    </tbody>
            </table>
            <button class="admin-btn" style="background:#95a5a6" onclick="closeModal('statsModal')">닫기</button>
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <div id="loginSection">
                <h2>관리자 인증</h2>
                <input type="password" id="adminPw" style="width:100%; padding:25px; font-size:2rem; border-radius:20px; border:1px solid #ddd; box-sizing:border-box;" placeholder="비밀번호">
                <button class="admin-btn" onclick="checkPw()">확인</button>
                <button class="admin-btn" style="background:#95a5a6" onclick="closeModal('adminModal')">취소</button>
            </div>
            <div id="uploadSection" style="display:none;">
                <h2>명단 업로드</h2>
                <input type="file" id="excelFile" accept=".xlsx, .xls" style="font-size:1.5rem; margin: 30px 0;">
                <button class="admin-btn" style="background:#95a5a6" onclick="closeModal('adminModal')">닫기</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC1eVAqF527F46V8EgB4lwzzprGyiwqpiU",
            authDomain: "dinner2-1bc7e.firebaseapp.com",
            databaseURL: "https://dinner2-1bc7e-default-rtdb.firebaseio.com",
            projectId: "dinner2-1bc7e",
            storageBucket: "dinner2-1bc7e.firebasestorage.app",
            messagingSenderId: "1097131635899",
            appId: "1:1097131635899:web:7c4d7c84e0db18690ee59e",
            measurementId: "G-NGWKJSG6RH"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allStudentsMaster = {}; // 전체 원본 명단 저장용
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'success') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15); 
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            }
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        // 전체 명단과 남은 명단을 비교하기 위해 두 경로 모두 모니터링
        db.ref('master_list').on('value', (snapshot) => {
            allStudentsMaster = snapshot.val() || {};
        });

        db.ref('students').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            document.getElementById('remainingCount').innerText = Object.keys(data).length;
        });

        document.getElementById('studentId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const id = this.value.trim();
                const resultDiv = document.getElementById('result');
                if(!id) return;
                resultDiv.classList.remove('pop-effect');
                
                db.ref('students/' + id).once('value', (snap) => {
                    void resultDiv.offsetWidth; 
                    if(snap.exists()) {
                        resultDiv.innerHTML = `<span class="sub-text">확인 완료</span><span style="color:#2ecc71;">✅ ${id}</span>`;
                        playSound('success'); 
                        db.ref('students/' + id).remove();
                    } else {
                        resultDiv.innerHTML = `<span class="sub-text" style="color:#e74c3c;">명단 없음</span><span style="color:#e74c3c;">❌ ${id}</span>`;
                        playSound('error'); 
                    }
                    resultDiv.classList.add('pop-effect');
                    this.value = ''; this.focus();
                });
            }
        });

        // 통계 계산 및 표시
        function showStats() {
            db.ref('students').once('value', (snapshot) => {
                const remainingStudents = snapshot.val() || {};
                const stats = {
                    1: { total: 0, remain: 0 },
                    2: { total: 0, remain: 0 },
                    3: { total: 0, remain: 0 }
                };

                // 1. 원본 명단 기준 학년별 전체 인원 분류
                Object.keys(allStudentsMaster).forEach(id => {
                    const grade = id.charAt(0);
                    if (stats[grade]) stats[grade].total++;
                });

                // 2. 남은 명단 기준 학년별 남은 인원 분류
                Object.keys(remainingStudents).forEach(id => {
                    const grade = id.charAt(0);
                    if (stats[grade]) stats[grade].remain++;
                });

                // 3. 테이블 생성
                let html = '';
                for (let i = 1; i <= 3; i++) {
                    const done = stats[i].total - stats[i].remain;
                    html += `<tr>
                        <td>${i}학년</td>
                        <td class="completed">${done}명</td>
                        <td class="pending">${stats[i].remain}명</td>
                        <td>${stats[i].total}명</td>
                    </tr>`;
                }
                document.getElementById('statBody').innerHTML = html;
                document.getElementById('statsModal').style.display = 'flex';
            });
        }

        function openAdmin() { document.getElementById('adminModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function checkPw() {
            if (document.getElementById('adminPw').value === "1234!") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('uploadSection').style.display = 'block';
            } else { alert("비밀번호 오류"); }
        }

        document.getElementById('excelFile').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                let uploadData = {};
                rows.forEach(row => { if(row[0]) uploadData[row[0].toString().trim()] = true; });
                
                // master_list(전체 원본)와 students(체크용) 두 곳에 저장
                db.ref('master_list').set(uploadData);
                db.ref('students').set(uploadData).then(() => {
                    alert("명단이 새로 등록되었습니다!");
                    closeModal('adminModal');
                });
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
